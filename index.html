function LeakFinder() {
  const [screen, setScreen] = useState("input");
  const [rawText, setRawText] = useState("");
  const [result, setResult] = useState(null);
  const [unlocked, setUnlocked] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");

  async function analyze() {
    if (!rawText.trim()) return;
    setScreen("loading");
    setErrorMsg("");
    try {
      const response = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: rawText }),
      });
      const parsed = await response.json();
      if (!response.ok || parsed.error) throw new Error(parsed.error || "Request failed");
      if (!parsed.items || !Array.isArray(parsed.items)) throw new Error("Malformed response");
      setResult(parsed);
      setUnlocked(false);
      setExpanded(null);
      setScreen("results");
    } catch (err) {
      console.error("Analysis error:", err);
      setErrorMsg("Couldn't analyze that data. Try pasting a longer statement export, or try the sample data.");
      setScreen("error");
    }
  }

  function copyScript(idx, script) {
    navigator.clipboard.writeText(script).catch(() => {});
    setCopiedIdx(idx);
    setTimeout(() => setCopiedIdx(null), 1600);
  }

  return (
    <div className="app-shell" style={{ fontFamily: FONT }}>
      <div style={{ height: "env(safe-area-inset-top, 0px)" }} />
      <div style={{ minHeight: "100vh", paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {screen === "input" && <InputScreen rawText={rawText} setRawText={setRawText} onAnalyze={analyze} />}
        {screen === "loading" && <LoadingScreen />}
        {screen === "error" && <ErrorScreen message={errorMsg} onBack={() => setScreen("input")} />}
        {screen === "results" && result && (
          <ResultsScreen result={result} unlocked={unlocked} setUnlocked={setUnlocked}
            expanded={expanded} setExpanded={setExpanded} copiedIdx={copiedIdx}
            copyScript={copyScript} onBack={() => setScreen("input")} />
        )}
      </div>
    </div>
  );
}

function spendDescription(v) {

  if (v <= 80) return "Your overall spending is in a reasonable range. Getting it under 60% would be excellent and give you even more freedom.";

function discretionaryDescription(v) {

function essentialDescription(v) {

  if (v <= 65) return "These are costs you need to cover no matter what — the goal isn't to cut these, just to be aware of them.";
  return "Essential costs make up a large share of your income. These aren't things to cut, but worth keeping an eye on as things change.";
}
function computeScore({ savingsRate, recurringPct, spendPct }) {
  const savingsComponent = Math.max(0, Math.min(40, (savingsRate / 30) * 40));
  const recurringComponent = Math.max(0, Math.min(30, 30 - (recurringPct / 20) * 30));
  const spendComponent = Math.max(0, Math.min(30, 30 - ((spendPct - 50) / 40) * 30));
  return Math.round(Math.max(0, Math.min(100, savingsComponent + recurringComponent + spendComponent)));
}
const SCORE_BANDS = [
  [10, "You're just getting started. Small changes today can lead to big improvements over time."],
  [20, "There's plenty of room to grow. Focus on reducing unnecessary spending and building consistent saving habits."],
  [30, "You're moving in the right direction, but your finances could benefit from a few meaningful adjustments."],
  [40, "A decent foundation, but improving your spending habits now will make saving much easier."],
  [50, "You're around the halfway mark. A few smart changes could noticeably improve your financial health."],

  [70, "A strong financial position. Stay consistent and look for small opportunities to save even more."],
  [80, "Great work! Your finances are in good shape, and you're building a solid path toward financial freedom."],
  [90, "Excellent! Your spending habits support long-term success. Keep up the consistency."],
  [100, "Outstanding! You're making exceptional financial decisions and maximizing your potential to build lasting wealth."],
];
function scoreDescription(score) {
  const band = SCORE_BANDS.find(([max]) => score <= max);
  return band ? band[1] : SCORE_BANDS[SCORE_BANDS.length - 1][1];
}

            </div>
            {!unlocked && lockedCount > 0 && (
              <button onClick={scrollToPricing} className="glass" style={{ display: "inline-flex", alignItems: "center", gap: 6, marginTop: 10, borderRadius: 14, padding: "9px 14px", whiteSpace: "nowrap", position: "relative", overflow: "hidden" }}>
                <Icon.Lock size={12} color={C.red} style={{ position: "relative" }} />
                <span style={{ fontSize: 11, fontWeight: 800, color: C.red, letterSpacing: 0.3, textTransform: "uppercase", position: "relative" }}>Unlock {lockedCount} Recurring Costs</span>
              </button>
            )}
          </div>
        </div>
      </div>

      {hasIncome && (
        <div style={{ margin: "0 20px 14px" }}>
          <div className="glass" style={{ borderRadius: 26, padding: "18px 18px", position: "relative", overflow: "hidden" }}>
            <div className="glass-swirl"></div>
            <div style={{ position: "relative" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 14 }}>
                <Icon.Sparkles size={16} color="#FF2D92" />
                <span style={{ fontSize: 15, fontWeight: 800, color: "#FFFFFF", letterSpacing: 0.5, textTransform: "uppercase" }}>Free Metrics</span>
              </div>

              {hasBalanceCheck && (
                <div style={{ paddingBottom: 14, marginBottom: 14, borderBottom: `1px solid ${C.separator}` }}>
                  <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase" }}>Balance Change (this period)</div>
                  <div style={{ fontSize: 12, color: C.textSecondary, marginTop: 2, opacity: 0.85 }}>(exact — calculated directly from your statement)</div>
                  <div style={{ fontSize: 24, fontWeight: 800, marginTop: 6, color: balanceChange >= 0 ? C.green : C.red }}>
                    {balanceChange >= 0 ? "+" : "-"}{cur}{Math.abs(balanceChange).toLocaleString(undefined, { maximumFractionDigits: 2 })}
                  </div>
                </div>
              )}

              {hasSuspicious && (
                <div style={{ paddingBottom: 14, marginBottom: 14, borderBottom: `1px solid ${C.separator}` }}>
                  <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase" }}>Suspicious Charges</div>
                  <div style={{ fontSize: 12, color: C.textSecondary, marginTop: 2, opacity: 0.85 }}>(unusual or unrecognized transactions worth double-checking)</div>
                  <div style={{ fontSize: 22, fontWeight: 800, marginTop: 6, color: C.orange }}>{result.suspiciousCharges.length} flagged</div>
                  <div style={{ marginTop: 8, borderRadius: 12, overflow: "hidden", background: "rgba(255,159,10,0.08)" }}>
                    {result.suspiciousCharges.map((s, i) => (
                      <div key={i} style={{ padding: "10px 12px", borderBottom: i < result.suspiciousCharges.length - 1 ? `1px solid ${C.separator}` : "none" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                          <span style={{ fontSize: 13, fontWeight: 600, color: C.textPrimary, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.description}</span>
                          <span style={{ fontSize: 13, fontWeight: 700, color: C.orange, flexShrink: 0 }}>{cur}{s.amount}</span>
                        </div>
                        <div style={{ fontSize: 11, color: C.textSecondary, marginTop: 2 }}>{s.date} — {s.reason}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <MetricRow label="Saving Rate" subtitle="(how much of your income you're saving)" value={`${Math.round(savingsRate)}%`} color={savingsColor(savingsRate)} description={savingsDescription(savingsRate)} onUnlock={scrollToPricing} />
              <MetricRow label="Recurring Costs" subtitle="(how much of your income goes on subscriptions)" value={`${Math.round(recurringPct)}%`} color={bandColor(recurringPct, 10, 20)} description={recurringDescription(recurringPct)} onUnlock={scrollToPricing} />
              <MetricRow label="Costs" subtitle="(how much of your income you're spending)" value={`${Math.round(spendPct)}%`} color={bandColor(spendPct, 60, 80)} description={spendDescription(spendPct)} onUnlock={scrollToPricing} />
              {discretionaryPct != null && (
                <MetricRow label="Discretionary Spending" subtitle="(how much you're spending on wants rather than needs)" value={`${Math.round(discretionaryPct)}%`} color={bandColor(discretionaryPct, 15, 30)} description={discretionaryDescription(discretionaryPct)} onUnlock={scrollToPricing} />
              )}
              {essentialPct != null && (
                <MetricRow label="Essential Spending" subtitle="(how much of your income goes on essentials)" value={`${Math.round(essentialPct)}%`} color={bandColor(essentialPct, 50, 65)} description={essentialDescription(essentialPct)} onUnlock={scrollToPricing} />
              )}
              {result.monthlyCashWithdrawn > 0 && (
                <MetricRow label="Cash Withdrawn" subtitle="(your average monthly cash withdrawal)" value={`${cur}${result.monthlyCashWithdrawn.toLocaleString(undefined, { maximumFractionDigits: 0 })}`} color={C.textPrimary} description="Cash is hard to trace once it's out of your account — if you're not sure where it all goes, keeping a rough note for a few weeks can be revealing." onUnlock={scrollToPricing} />
              )}
              {result.largestCategoryName && (
                <MetricRow label="Largest Spending Category" value={`${result.largestCategoryName} · ${cur}${fmt(result.largestCategoryTotal)}`} color={C.textPrimary}
                  description="This is where your money goes most. Focusing on your largest expense is often the fastest way to unlock bigger savings and reach your financial goals sooner. However, if it's an essential expense, don't worry — it's simply something to be aware of, not something to stress over." onUnlock={scrollToPricing} last />
              )}

              <div style={{ marginTop: 4, paddingTop: 14, borderTop: `1px solid ${C.separator}`, fontSize: 12.5, color: C.textPrimary, lineHeight: 1.5 }}>
                Small, consistent choices compound over time — the fact that you're looking closely at this already puts you ahead. Pick one thing from this report to change this month, and let it become a habit before adding the next.
              </div>
            </div>
          </div>
        </div>
      )}

      {score != null && (
        <div style={{ margin: "0 20px 14px" }}>
          <div onClick={() => !unlocked && scrollToPricing()} className="glass" style={{ textAlign: "left", borderRadius: 26, padding: "18px 18px", position: "relative", cursor: unlocked ? "default" : "pointer", overflow: "hidden" }}>
            <div className="glass-swirl"></div>
            <div style={{ position: "relative" }}>
              <div style={{ fontSize: 15, fontWeight: 800, color: "#FFFFFF", letterSpacing: 0.5, textTransform: "uppercase" }}>Financial Health Score</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", marginTop: 14 }}>
                <ScoreGauge score={score} color={scoreColor} locked={!unlocked} showLockedLabel size={130} thickness={13} />
              </div>
              {!unlocked ? (
                <button onClick={scrollToPricing} className="glass" style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, borderRadius: 14, padding: "10px 14px", marginTop: 16, position: "relative", overflow: "hidden" }}>
                  <Icon.Lock size={12} color="#C3B8FF" />
                  <span style={{ fontSize: 11.5, fontWeight: 800, color: "#C3B8FF", letterSpacing: 0.3, textTransform: "uppercase" }}>Unlock Score</span>
                </button>
              ) : (
                <div style={{ fontSize: 12.5, color: "#C7C7CC", marginTop: 14, lineHeight: 1.5, textAlign: "center" }}>
                  {scoreDescription(score)}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div style={{ margin: "0 20px 20px" }}>
        <div onClick={() => !unlocked && scrollToPricing()} className="glass" style={{ textAlign: "left", borderRadius: 26, padding: "18px 18px", position: "relative", cursor: unlocked ? "default" : "pointer", overflow: "hidden" }}>
          <div className="glass-swirl"></div>
          <div style={{ position: "relative" }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: "#FFFFFF", letterSpacing: 0.5, textTransform: "uppercase" }}>AI Summary</div>

            {unlocked ? (
              <div style={{ marginTop: 12 }}>
                <div style={{ fontSize: 13, color: C.textPrimary, lineHeight: 1.55 }}>
                  {result.discretionarySummary || "Nice work — we didn't find much one-off discretionary spending worth flagging here."}
                </div>
                {result.discretionaryExamples && result.discretionaryExamples.length > 0 && (
                  <div style={{ marginTop: 10, borderRadius: 12, overflow: "hidden", background: "rgba(255,255,255,0.06)" }}>
                    {result.discretionaryExamples.map((ex, i) => (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 12px", borderBottom: i < result.discretionaryExamples.length - 1 ? `1px solid ${C.separator}` : "none" }}>
                        <div style={{ minWidth: 0 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ex.description}</div>
                          <div style={{ fontSize: 11, color: C.textSecondary, marginTop: 1 }}>{ex.category}</div>
                        </div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", flexShrink: 0, marginLeft: 8 }}>{cur}{ex.amount}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ) : (
              <React.Fragment>
                <div style={{ fontSize: 12, color: C.textSecondary, marginTop: 8, lineHeight: 1.4 }}>Your spending patterns suggest…</div>
                <button onClick={scrollToPricing} className="glass" style={{ marginTop: 14, display: "inline-flex", alignItems: "center", gap: 6, borderRadius: 14, padding: "10px 14px", whiteSpace: "nowrap", position: "relative", overflow: "hidden" }}>
                  <Icon.Lock size={12} color={C.blue} />
                  <span style={{ fontSize: 11.5, fontWeight: 800, color: C.blue, letterSpacing: 0.3, textTransform: "uppercase" }}>Unlock Summary</span>
                </button>
              </React.Fragment>
            )}
          </div>
        </div>
      </div>

      {!unlocked && (
        <div ref={pricingRef} style={{ padding: "16px 20px 0" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textSecondary, marginBottom: 10, marginLeft: 4, textTransform: "uppercase", letterSpacing: 0.4 }}>Unlock Everything</div>
          <PricingOptions setUnlocked={setUnlocked} />
        </div>
      )}

      {showUnlockModal && (
        <div style={{ position: "fixed", inset: 0, zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div onClick={() => setShowUnlockModal(false)} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.72)", backdropFilter: "blur(6px)", WebkitBackdropFilter: "blur(6px)" }}></div>
          <div className="glass" style={{ position: "relative", width: "100%", maxWidth: 400, maxHeight: "88vh", overflowY: "auto", borderRadius: 26, padding: "22px 20px" }}>
            <button onClick={() => setShowUnlockModal(false)} style={{ position: "absolute", top: 14, right: 14, background: "rgba(255,255,255,0.10)", border: "none", borderRadius: "50%", width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
              <Icon.X size={15} color={C.textPrimary} />
            </button>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textSecondary, marginBottom: 14, textTransform: "uppercase", letterSpacing: 0.4 }}>Unlock Everything</div>
            <PricingOptions setUnlocked={(v) => { setUnlocked(v); setShowUnlockModal(false); }} />
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LeakFinder />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
  }
  if ("caches" in window) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
  }
</script>
</body>
</html>
