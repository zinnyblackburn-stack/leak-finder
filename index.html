function LeakFinder() {
  const [screen, setScreen] = useState("input");
  const [rawText, setRawText] = useState("");
  const [result, setResult] = useState(null);
  const [unlocked, setUnlocked] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");

  async function analyze() {
    if (!rawText.trim()) return;
    setScreen("loading");
    setErrorMsg("");
    try {
      const response = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: rawText }),
      });
      const parsed = await response.json();
      if (!response.ok || parsed.error) throw new Error(parsed.error || "Request failed");
      if (!parsed.items || !Array.isArray(parsed.items)) throw new Error("Malformed response");
      setResult(parsed);
      setUnlocked(false);
      setExpanded(null);
      setScreen("results");
    } catch (err) {
      console.error("Analysis error:", err);
      setErrorMsg("Couldn't analyze that data. Try pasting a longer statement export, or try the sample data.");
      setScreen("error");
    }
  }

  function copyScript(idx, script) {
    navigator.clipboard.writeText(script).catch(() => {});
    setCopiedIdx(idx);
    setTimeout(() => setCopiedIdx(null), 1600);
  }

  const confColor = (conf) => (conf === "high" ? C.red : conf === "medium" ? C.orange : C.textSecondary);

  return (
    <div className="app-shell" style={{ fontFamily: FONT }}>
      <div style={{ height: "env(safe-area-inset-top, 0px)" }} />
      <div style={{ minHeight: "100vh", paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {screen === "input" && <InputScreen rawText={rawText} setRawText={setRawText} onAnalyze={analyze} />}
        {screen === "loading" && <LoadingScreen />}
        {screen === "error" && <ErrorScreen message={errorMsg} onBack={() => setScreen("input")} />}
        {screen === "results" && result && (
          <ResultsScreen result={result} unlocked={unlocked} setUnlocked={setUnlocked}
            expanded={expanded} setExpanded={setExpanded} copiedIdx={copiedIdx}
            copyScript={copyScript} confColor={confColor} onBack={() => setScreen("input")} />
        )}
      </div>
    </div>
  );
}

function NavTitle({ children, onBack }) {

}

      <p style={{ padding: "0 20px", color: C.textSecondary, fontSize: 14.5, marginTop: 10, lineHeight: 1.55 }}>
        Paste 3–6 months of your bank or card transaction history and let our AI do the rest. You'll receive a detailed, easy-to-understand report revealing where your money goes, what's quietly costing you every month, your Financial Health Score, and personalised insights designed to help you save more money and grow your wealth.
      </p>
      <div style={{ padding: "16px 20px" }}>

      <div style={{ padding: "0 20px" }}>
        <button onClick={() => setRawText(SAMPLE_DATA)} className="glass"

          Try sample data

function ErrorScreen({ message, onBack }) {

      <button onClick={onBack} style={{ background: `linear-gradient(135deg, ${C.blue}, ${C.purple})`, color: "#fff", border: "none", borderRadius: 14, padding: "13px 28px", fontSize: 16, fontWeight: 700 }}>Try again</button>
    </div>

function bandColor(value, greenMax, yellowMax) {
  if (value <= greenMax) return C.green;
  if (value <= yellowMax) return C.orange;
  return C.red;
}
function savingsColor(v) {
  if (v >= 30) return C.green;
  if (v >= 20) return C.orange;
  return C.red;
}
function computeScore({ savingsRate, recurringPct, spendPct }) {
  const savingsComponent = Math.max(0, Math.min(40, (savingsRate / 30) * 40));
  const recurringComponent = Math.max(0, Math.min(30, 30 - (recurringPct / 20) * 30));
  const spendComponent = Math.max(0, Math.min(30, 30 - ((spendPct - 50) / 40) * 30));
  return Math.round(Math.max(0, Math.min(100, savingsComponent + recurringComponent + spendComponent)));
}
const SCORE_BANDS = [
  [10, "You're just getting started. Small changes today can lead to big improvements over time."],
  [20, "There's plenty of room to grow. Focus on reducing unnecessary spending and building consistent saving habits."],
  [30, "You're moving in the right direction, but your finances could benefit from a few meaningful adjustments."],
  [40, "A decent foundation, but improving your spending habits now will make saving much easier."],
  [50, "You're around the halfway mark. A few smart changes could noticeably improve your financial health."],
  [60, "You're doing well. Keep reducing unnecessary expenses and your progress will continue to build."],
  [70, "A strong financial position. Stay consistent and look for small opportunities to save even more."],
  [80, "Great work! Your finances are in good shape, and you're building a solid path toward financial freedom."],
  [90, "Excellent! Your spending habits support long-term success. Keep up the consistency."],
  [100, "Outstanding! You're making exceptional financial decisions and maximizing your potential to build lasting wealth."],
];
function scoreDescription(score) {
  const band = SCORE_BANDS.find(([max]) => score <= max);
  return band ? band[1] : SCORE_BANDS[SCORE_BANDS.length - 1][1];
}

function ScoreGauge({ score, color, size = 150, thickness = 14 }) {
  const inner = size - thickness * 2;
  const deg = Math.max(0, Math.min(360, score * 3.6));
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: `conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.08) ${deg}deg)`, boxShadow: `0 0 36px ${color}55` }} />
      <div style={{ position: "absolute", top: thickness, left: thickness, width: inner, height: inner, borderRadius: "50%", background: C.panelSolid, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div style={{ fontSize: 34, fontWeight: 800, color: "#fff", filter: "none" }}>{score}</div>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#8E8E93" }}>/ 100</div>
      </div>
    </div>
  );
}

function StatCard({ label, subtitle, value, unlocked, color, description, onClick }) {
  return (
    <button onClick={onClick} className="glass" style={{ width: "100%", textAlign: "left", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 20, padding: "16px 18px", marginBottom: 10, cursor: unlocked ? "default" : "pointer", display: "block" }}>

          {description}

      )}
      {!unlocked && (
        <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 10 }}>
          <Icon.Lock size={12} color={C.blue} />
          <span style={{ fontSize: 12, fontWeight: 700, color: C.blue }}>Tap to unlock</span>

      )}

function ResultsScreen({ result, unlocked, setUnlocked, expanded, setExpanded, copiedIdx, copyScript, confColor, onBack }) {
  const cur = result.currencySymbol || "$";
  const visibleItems = unlocked ? result.items : result.items.slice(0, 1);
  const lockedCount = result.items.length - visibleItems.length;
  const hasIncome = result.monthlyIncome > 0;

  const recurringPct = hasIncome ? (result.totalMonthly / result.monthlyIncome) * 100 : 0;
  const spendPct = hasIncome ? (result.monthlySpending / result.monthlyIncome) * 100 : 0;
  const savingsRate = hasIncome ? ((result.monthlyIncome - result.monthlySpending) / result.monthlyIncome) * 100 : 0;
  const discretionaryPct = hasIncome && result.monthlyDiscretionary != null ? (result.monthlyDiscretionary / result.monthlyIncome) * 100 : null;
  const essentialPct = hasIncome && result.monthlyEssential != null ? (result.monthlyEssential / result.monthlyIncome) * 100 : null;
  const score = hasIncome ? computeScore({ savingsRate, recurringPct, spendPct }) : null;
  const scoreColor = score == null ? C.blue : score >= 70 ? C.green : score >= 40 ? C.orange : C.red;
  const hasBalanceCheck = result.startingBalance != null && result.endingBalance != null;
  const balanceChange = hasBalanceCheck ? result.endingBalance - result.startingBalance : null;
  const isVariableIncome = result.incomeSteadiness === "variable";

  const fmt = (n) => Math.round(n).toLocaleString();

  return (
    <div style={{ paddingBottom: 24 }}>
      <NavTitle onBack={onBack}>Your Report</NavTitle>

      <div style={{ margin: "0 20px 12px" }}>
        <div className="glass" style={{ background: `linear-gradient(135deg, rgba(10,132,255,0.35), rgba(94,92,230,0.35))`, borderRadius: 26, padding: 24, display: "flex", alignItems: "center", gap: 18 }}>
          <div style={{ position: "relative", flexShrink: 0, width: 70, height: 70, borderRadius: "50%", background: "rgba(255,255,255,0.12)", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 0 24px rgba(10,132,255,0.5)" }}>
            <Icon.Sparkles size={26} color="#fff" />
          </div>
          <div>
            <div style={{ color: "#D7E6FF", fontSize: 13, fontWeight: 600 }}>YEARLY RECURRING COSTS</div>
            <div style={{ color: "#fff", fontSize: 32, fontWeight: 800, letterSpacing: -0.5 }}>{cur}{result.totalAnnual?.toLocaleString()}</div>
            <div style={{ color: "#D7E6FF", fontSize: 13, marginTop: 2 }}>{result.itemCount} recurring payments · {cur}{fmt(result.totalMonthly)}/mo</div>
          </div>
        </div>
      </div>

      {hasIncome && (
        <div style={{ margin: "0 20px 12px" }}>
          <div className="glass" style={{ borderRadius: 20, padding: "16px 18px" }}>
            <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase" }}>Monthly Income</div>
            <div style={{ fontSize: 27, fontWeight: 800, color: C.textPrimary, marginTop: 8 }}>{cur}{result.monthlyIncome?.toLocaleString()}</div>
          </div>
        </div>
      )}

      <div style={{ margin: "0 20px 20px" }}>
        <div className="glass" style={{ borderRadius: 20, padding: "16px 18px", marginBottom: 10, background: "rgba(255,69,58,0.10)", border: "1px solid rgba(255,69,58,0.35)" }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 8, marginBottom: 12 }}>
            <span style={{ fontSize: 16 }}>⚠️</span>
            <span style={{ fontSize: 13.5, fontWeight: 700, color: "#FFD4D0", lineHeight: 1.4 }}>Some payments below have been flagged for review. Make sure you recognise each one and cancel anything you no longer need.</span>
          </div>
          <div style={{ borderRadius: 16, overflow: "hidden", background: "rgba(0,0,0,0.15)" }}>
            {visibleItems.map((item, i) => (
              <div key={i}>
                <button onClick={() => setExpanded(expanded === i ? null : i)}
                  style={{ width: "100%", padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", background: "none", border: "none", borderBottom: i < visibleItems.length - 1 || expanded === i ? `1px solid ${C.separator}` : "none", textAlign: "left" }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontSize: 15, fontWeight: 600, color: C.textPrimary }}>{item.merchant}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, color: "#fff", background: confColor(item.confidence), borderRadius: 6, padding: "2px 6px", textTransform: "uppercase" }}>{item.confidence}</span>
                    </div>
                    <div style={{ fontSize: 13, color: C.textSecondary, marginTop: 2 }}>{item.note}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0, marginLeft: 8 }}>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 15, fontWeight: 700, color: C.textPrimary }}>
                        {cur}{item.lastAmount}<span style={{ fontSize: 11, color: C.textSecondary, fontWeight: 400 }}>/{item.frequency === "monthly" ? "mo" : item.frequency === "annual" ? "yr" : "wk"}</span>
                      </div>
                      <div style={{ fontSize: 10.5, color: C.textSecondary, marginTop: 1 }}>this month</div>
                      <div style={{ fontSize: 11, color: C.textSecondary, marginTop: 2 }}>avg/mo: {cur}{item.avgAmount}</div>
                    </div>
                    <Icon.ChevronDown size={16} color={C.textSecondary} style={{ transform: expanded === i ? "rotate(180deg)" : "none", transition: "transform 0.2s" }} />
                  </div>
                </button>
                {expanded === i && (
                  <div style={{ padding: "0 16px 16px", borderBottom: i < visibleItems.length - 1 ? `1px solid ${C.separator}` : "none" }}>
                    <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 14, padding: 12, fontSize: 13, color: C.textPrimary, lineHeight: 1.5 }}>{item.cancellationScript}</div>
                    <button onClick={() => copyScript(i, item.cancellationScript)}
                      style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: C.blue, fontSize: 14, fontWeight: 600, padding: 0 }}>
                      {copiedIdx === i ? <Icon.Check size={15} /> : <Icon.Copy size={15} />}
                      {copiedIdx === i ? "Copied" : "Copy script"}
                    </button>
                  </div>
                )}
              </div>
            ))}
            {!unlocked && lockedCount > 0 && (
              <button onClick={() => setUnlocked(true)}
                style={{ width: "100%", padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.04)", border: "none", textAlign: "left" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Icon.Lock size={14} color="#FFD4D0" />
                  <span style={{ fontSize: 13.5, fontWeight: 700, color: "#FFD4D0" }}>{lockedCount} more recurring {lockedCount === 1 ? "payment" : "payments"} locked</span>
                </div>
                <Icon.ChevronDown size={16} color="#FFD4D0" style={{ transform: "rotate(-90deg)" }} />
              </button>
            )}
          </div>
          <div style={{ fontSize: 12.5, color: "#F0D9D6", marginTop: 12, lineHeight: 1.5 }}>
            Not every recurring payment is a leak. A good approach is to regularly review what you're paying for and only keep what still adds value.
          </div>
        </div>
      </div>

      {hasIncome && (
        <div style={{ margin: "0 20px 20px" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textSecondary, margin: "6px 4px 8px", textTransform: "uppercase", letterSpacing: 0.4 }}>Financial Health</div>

          {isVariableIncome && (
            <div className="glass" style={{ margin: "0 0 10px", padding: "12px 14px", borderRadius: 16, fontSize: 12.5, color: C.textPrimary, lineHeight: 1.5 }}>
              Your income includes freelance or client-style payments from multiple sources. We've also calculated an exact Balance Change below, taken directly from your statement, as a precise reality check alongside these figures.
            </div>
          )}

          {hasBalanceCheck && (
            <div className="glass" style={{ borderRadius: 20, padding: "16px 18px", marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase" }}>Balance Change (this period)</div>
              <div style={{ fontSize: 12.5, color: C.textSecondary, marginTop: 2, opacity: 0.85 }}>(exact — calculated directly from your statement)</div>
              <div style={{ fontSize: 27, fontWeight: 800, marginTop: 8, color: balanceChange >= 0 ? C.green : C.red, filter: unlocked ? "none" : "blur(9px)" }}>
                {balanceChange >= 0 ? "+" : "-"}{cur}{Math.abs(balanceChange).toLocaleString(undefined, { maximumFractionDigits: 2 })}
              </div>
              {!unlocked && (
                <button onClick={() => setUnlocked(true)} style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 10, background: "none", border: "none", padding: 0 }}>
                  <Icon.Lock size={12} color={C.blue} />
                  <span style={{ fontSize: 12, fontWeight: 700, color: C.blue }}>Tap to unlock</span>
                </button>
              )}
            </div>
          )}

          <StatCard
            label="Savings Rate"
            value={`${Math.round(savingsRate)}%`}
            unlocked={unlocked}
            color={savingsColor(savingsRate)}
            description="This is the money you're keeping for your future. Aim to save at least 20% of your income, with 30% or more being an excellent target. Every month you save brings you one step closer to financial freedom."
            onClick={() => !unlocked && setUnlocked(true)}
          />

          <StatCard
            label="Recurring Costs / Income"
            subtitle="(monthly commitments, subscriptions, leaks)"
            value={`${Math.round(recurringPct)}%  ·  ${cur}${fmt(result.totalMonthly)}/mo`}
            unlocked={unlocked}
            color={bandColor(recurringPct, 10, 20)}
            description="Try to keep recurring costs below 10–15% of your income. Under 10% is excellent, while above 20% can limit your financial flexibility. Keeping monthly commitments low makes it easier to save and adapt to life's changes."
            onClick={() => !unlocked && setUnlocked(true)}
          />

          <StatCard
            label="Costs / Income"
            subtitle="(how much of your income you're spending overall)"
            value={`${Math.round(spendPct)}%  ·  ${cur}${fmt(result.monthlySpending)}/mo`}
            unlocked={unlocked}
            color={bandColor(spendPct, 60, 80)}
            description="Aim to keep this below 70% of your income. Below 60% is excellent, while above 80% can make saving much harder. Every percentage point you reduce gives you more freedom to save, invest, and reach your goals."
            onClick={() => !unlocked && setUnlocked(true)}
          />

          {discretionaryPct != null && (
            <StatCard
              label="Discretionary Spending"
              subtitle="(how much you're spending on wants rather than needs)"
              value={`${Math.round(discretionaryPct)}%`}
              unlocked={unlocked}
              color={bandColor(discretionaryPct, 15, 30)}
              description="Wants are things you enjoy but could trim without much impact — a good first place to look for extra savings."
              onClick={() => !unlocked && setUnlocked(true)}
            />
          )}

          {essentialPct != null && (
            <StatCard
              label="Essential Spending"
              subtitle="(groceries, utilities, transport, insurance)"
              value={`${Math.round(essentialPct)}%`}
              unlocked={unlocked}
              color={bandColor(essentialPct, 50, 65)}
              description="These are costs you need to cover no matter what — the goal isn't to cut these, just to be aware of them."
              onClick={() => !unlocked && setUnlocked(true)}
            />
          )}

          {result.largestCategoryName && (
            <StatCard
              label="Largest Spending Category"
              value={`${result.largestCategoryName} · ${cur}${fmt(result.largestCategoryTotal)}`}
              unlocked={unlocked}
              color={C.textPrimary}
              description="This is where your money goes most. Focusing on your largest expense is often the fastest way to unlock bigger savings and reach your financial goals sooner. However, if it's an essential expense, don't worry—it's simply something to be aware of, not something to stress over."
              onClick={() => !unlocked && setUnlocked(true)}
            />
          )}

          {score != null && (
            <div style={{ background: C.panelSolid, border: "1px solid rgba(255,255,255,0.10)", borderRadius: 24, padding: "22px 20px", marginTop: 6, display: "flex", alignItems: "center", gap: 18, boxShadow: `0 12px 32px rgba(0,0,0,0.5)` }}>
              <div style={{ position: "relative", width: 150, height: 150, flexShrink: 0 }}>
                <ScoreGauge score={score} color={scoreColor} />
                {!unlocked && (
                  <div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: "rgba(11,11,16,0.95)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <Icon.Lock size={30} color="#FFD60A" />
                  </div>
                )}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 11, color: "#8E8E93", fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase" }}>Financial Health Score</div>
                <div style={{ fontSize: 12.5, color: "#C7C7CC", marginTop: 8, lineHeight: 1.5, filter: unlocked ? "none" : "blur(3px)" }}>
                  {scoreDescription(score)}
                </div>
                {!unlocked && (
                  <button onClick={() => setUnlocked(true)} style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 10, background: "none", border: "none", padding: 0 }}>
                    <Icon.Lock size={12} color="#FFD60A" />
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#FFD60A" }}>Tap to unlock</span>
                  </button>
                )}
              </div>
            </div>
          )}

          {unlocked && (
            <div className="glass" style={{ marginTop: 12, padding: "14px 16px", borderRadius: 18 }}>
              <div style={{ fontSize: 12.5, color: C.textPrimary, lineHeight: 1.5 }}>
                Small, consistent choices compound over time — the fact that you're looking closely at this already puts you ahead. Pick one thing from this report to change this month, and let it become a habit before adding the next.
              </div>
            </div>
          )}
        </div>
      )}

      {!unlocked && lockedCount > 0 && (
        <div style={{ padding: "16px 20px 0" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textSecondary, marginBottom: 10, marginLeft: 4, textTransform: "uppercase", letterSpacing: 0.4 }}>Unlock Everything</div>

          <button onClick={() => setUnlocked(true)} className="glass"
            style={{ width: "100%", borderRadius: 20, padding: "16px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ textAlign: "left" }}>
              <div style={{ color: C.textPrimary, fontSize: 15, fontWeight: 700 }}>Unlock this report</div>
              <div style={{ color: C.textSecondary, fontSize: 12 }}>One-time · all leaks, scripts & metrics</div>
            </div>
            <div style={{ color: C.textPrimary, fontSize: 18, fontWeight: 800 }}>$9</div>
          </button>

          <button onClick={() => setUnlocked(true)}
            style={{ width: "100%", background: `linear-gradient(135deg, ${C.blue}, ${C.purple})`, border: "none", borderRadius: 20, padding: "16px 18px", position: "relative", boxShadow: "0 10px 28px rgba(10,132,255,0.4)", marginBottom: 10 }}>
            <div style={{ position: "absolute", top: -9, left: 18, background: "#FFD60A", color: "#1C1C1E", fontSize: 10, fontWeight: 800, padding: "3px 10px", borderRadius: 8, letterSpacing: 0.3 }}>BEST VALUE</div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ textAlign: "left" }}>
                <div style={{ color: "#fff", fontSize: 15, fontWeight: 700 }}>Monthly membership</div>
                <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 12 }}>Every future report unlocked, cheaper than one-off</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: "#fff", fontSize: 18, fontWeight: 800 }}>$6.99</div>
                <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 11 }}>/month</div>
              </div>
            </div>
          </button>

          <button onClick={() => setUnlocked(true)} className="glass"
            style={{ width: "100%", borderRadius: 20, padding: "16px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ textAlign: "left" }}>
              <div style={{ color: C.textPrimary, fontSize: 15, fontWeight: 700 }}>Share Pack — 2 unlocks</div>
              <div style={{ color: C.textSecondary, fontSize: 12 }}>One for you, one for a friend · save $3</div>
            </div>
            <div style={{ color: C.textPrimary, fontSize: 18, fontWeight: 800 }}>$15</div>
          </button>

          <div style={{ textAlign: "center", fontSize: 11, color: C.textSecondary, marginTop: 10 }}>Demo only, no real charge yet</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LeakFinder />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
  }
  if ("caches" in window) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
  }
</script>
</body>
</html>
