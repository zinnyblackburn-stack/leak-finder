function LeakFinder() {
  const [screen, setScreen] = useState("input");
  const [rawText, setRawText] = useState("");
  const [result, setResult] = useState(null);
  const [unlocked, setUnlocked] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");

  async function analyze() {
    if (!rawText.trim()) return;
    setScreen("loading");
    setErrorMsg("");
    try {
      const response = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: rawText }),
      });
      const parsed = await response.json();
      if (!response.ok || parsed.error) throw new Error(parsed.error || "Request failed");
      if (!parsed.items || !Array.isArray(parsed.items)) throw new Error("Malformed response");
      setResult(parsed);
      setUnlocked(false);
      setExpanded(null);
      setScreen("results");
    } catch (err) {
      console.error("Analysis error:", err);
      setErrorMsg("Couldn't analyze that data. Try pasting a longer statement export, or try the sample data.");
      setScreen("error");
    }
  }

  function copyScript(idx, script) {
    navigator.clipboard.writeText(script).catch(() => {});
    setCopiedIdx(idx);
    setTimeout(() => setCopiedIdx(null), 1600);
  }

  return (
    <div className="app-shell" style={{ fontFamily: FONT }}>
      <div style={{ height: "env(safe-area-inset-top, 0px)" }} />
      <div style={{ minHeight: "100vh", paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {screen === "input" && <InputScreen rawText={rawText} setRawText={setRawText} onAnalyze={analyze} />}
        {screen === "loading" && <LoadingScreen />}
        {screen === "error" && <ErrorScreen message={errorMsg} onBack={() => setScreen("input")} />}
        {screen === "results" && result && (
          <ResultsScreen result={result} unlocked={unlocked} setUnlocked={setUnlocked}
            expanded={expanded} setExpanded={setExpanded} copiedIdx={copiedIdx}
            copyScript={copyScript} onBack={() => setScreen("input")} />
        )}
      </div>
    </div>
  );
}

function InputScreen({ rawText, setRawText, onAnalyze }) {
  const titleRef = React.useRef(null);
  const sloganRef = React.useRef(null);
  const paraRef = React.useRef(null);
  const [titleScale, setTitleScale] = useState(1);
  const [sloganScale, setSloganScale] = useState(1);

  React.useLayoutEffect(() => {
    function measure() {
      if (!titleRef.current || !sloganRef.current || !paraRef.current) return;
      titleRef.current.style.transform = "scaleX(1) scaleY(1)";
      sloganRef.current.style.transform = "scaleX(1)";
      const naturalTitleWidth = titleRef.current.getBoundingClientRect().width;
      const targetWidth = paraRef.current.getBoundingClientRect().width * 0.92;
      const newTitleScale = naturalTitleWidth > 0 ? targetWidth / naturalTitleWidth : 1;
      const titleRenderedWidth = naturalTitleWidth * newTitleScale;
      const naturalSloganWidth = sloganRef.current.getBoundingClientRect().width;
      const newSloganScale = naturalSloganWidth > 0 ? titleRenderedWidth / naturalSloganWidth : 1;
      setTitleScale(newTitleScale);
      setSloganScale(newSloganScale);
    }
    measure();
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(measure);
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);

  return (
    <div>
      <div style={{ padding: "28px 20px 0", textAlign: "center" }}>
        <div ref={titleRef} style={{
          fontFamily: "'Bebas Neue', 'Oswald', " + FONT,

          filter: "drop-shadow(0 0 10px rgba(255,255,255,0.5)) drop-shadow(0 6px 22px rgba(10,132,255,0.4))",

          transform: `scaleX(${titleScale}) scaleY(1.12)`, transformOrigin: "center",
        }}>
          MONEY LEAK DETECTOR

        <div style={{ marginTop: 12 }}>
          <div ref={sloganRef} style={{ fontSize: 12, fontWeight: 700, fontStyle: "italic", color: C.blue, letterSpacing: 1, textTransform: "uppercase", display: "inline-block", whiteSpace: "nowrap", transform: `scaleX(${sloganScale})`, transformOrigin: "center" }}>
            Know Your Money · Grow Your Wealth
          </div>
        </div>
      </div>
      <p ref={paraRef} style={{ padding: "0 20px", color: C.textSecondary, fontSize: 13, marginTop: 14, lineHeight: 1.45 }}>
        Paste 3–6 months of your bank or card transaction history and let our AI do the rest. You'll receive a detailed, easy-to-understand report revealing where your money goes, what's quietly costing you every month, your Financial Health Score, and personalised insights designed to help you save more money and grow your wealth.
      </p>
      <div style={{ padding: "12px 20px 0" }}>
        <div className="glass" style={{ borderRadius: 20, position: "relative", overflow: "hidden" }}>
          <div className="glass-swirl"></div>
                    <textarea value={rawText} onChange={(e) => setRawText(e.target.value)}
            placeholder="Paste your transaction history here..."
            style={{ position: "relative", width: "100%", height: "clamp(100px, 20vh, 190px)", borderRadius: 20, padding: 14, fontSize: 14, color: C.textPrimary, fontFamily: "ui-monospace, SFMono-Regular, monospace", resize: "none", outline: "none", background: "transparent", border: "none" }} />
        </div>
      </div>
      <div style={{ padding: "10px 20px 0" }}>
        <button onClick={() => setRawText(SAMPLE_DATA)} className="glass"

const LOADING_STAGES = [
  { at: 0, text: "Analysing your transaction data..." },
  { at: 3000, text: "Reviewing recurring payments..." },
  { at: 6000, text: "Potential money leaks detected", warn: true },
  { at: 9000, text: "Analysing the best ways to save your money..." },
];

function LoadingScreen() {
  const [stage, setStage] = useState(0);
  React.useEffect(() => {
    const timers = LOADING_STAGES.slice(1).map((s, i) =>
      setTimeout(() => setStage(i + 1), s.at)
    );
    return () => timers.forEach(clearTimeout);
  }, []);
  const current = LOADING_STAGES[stage];
  return (
    <div style={{ height: "80vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
      <div style={{ animation: "spin 1s linear infinite" }}>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke={C.blue} strokeWidth="2.5" strokeLinecap="round">
          <path d="M21 12a9 9 0 1 1-9-9" />

      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 16, fontWeight: 600, color: C.textPrimary, textAlign: "center", padding: "0 30px" }}>
        {current.warn && <Icon.AlertTriangle size={18} color={C.red} style={{ flexShrink: 0 }} />}
        {current.text}
      </div>
    </div>
  );
}

function bandColor(value, greenMax, yellowMax) {

function savingsColor(v) {
  if (v >= 30) return C.green;
  if (v >= 20) return C.orange;
  return C.red;
}
function costTier(monthlyAmount) {
  if (monthlyAmount < 6) return "LOW";
  if (monthlyAmount < 14) return "MEDIUM";
  return "HIGH";
}
function costTierColor(tier) {
  return tier === "HIGH" ? C.red : tier === "MEDIUM" ? C.orange : C.textSecondary;
}
function savingsDescription(v) {
  if (v >= 30) return "You're saving over 30% of your income — an excellent rate. Keep this consistency going, and consider putting part of it toward long-term investments.";
  if (v >= 20) return "You're saving at least 20% of your income, a solid habit. Pushing toward 30%+ would put you in excellent territory.";
  return "This is the money you're keeping for your future. Aim to save at least 20% of your income, with 30% or more considered excellent.";
}
function recurringDescription(v) {
  if (v <= 10) return "Your recurring costs are under 10% of your income — excellent. Keeping monthly commitments this low gives you a lot of flexibility.";
  if (v <= 20) return "Your recurring costs are in a reasonable range. Getting them under 10% would be excellent and free up even more flexibility.";
  return "Recurring costs above 20% of your income can limit your flexibility. Reviewing your subscriptions is a good place to start.";
}
function spendDescription(v) {
  if (v <= 60) return "You're spending under 60% of your income — excellent. This leaves plenty of room to save, invest, and reach your goals.";
  if (v <= 80) return "Your overall spending is in a reasonable range. Getting it under 60% would be excellent and give you even more freedom.";
  return "Spending above 80% of your income can make saving much harder. Every percentage point you reduce gives you more freedom.";
}
function discretionaryDescription(v) {
  if (v <= 15) return "Discretionary spending under 15% is excellent — you're already keeping wants well in check.";
  if (v <= 30) return "This is a reasonable level of discretionary spending. Wants are things you enjoy but could trim without much impact if you want to save more.";
  return "Discretionary spending above 30% suggests there may be easy wins here. Wants are things you enjoy but could trim without much impact.";
}
function essentialDescription(v) {
  if (v <= 50) return "Your essential spending is low relative to income, which leaves a lot of flexibility elsewhere.";
  if (v <= 65) return "These are costs you need to cover no matter what — the goal isn't to cut these, just to be aware of them.";
  return "Essential costs make up a large share of your income. These aren't things to cut, but worth keeping an eye on as things change.";
}
function computeScore({ savingsRate, recurringPct, spendPct }) {
  const savingsComponent = Math.max(0, Math.min(40, (savingsRate / 30) * 40));
  const recurringComponent = Math.max(0, Math.min(30, 30 - (recurringPct / 20) * 30));
  const spendComponent = Math.max(0, Math.min(30, 30 - ((spendPct - 50) / 40) * 30));
  return Math.round(Math.max(0, Math.min(100, savingsComponent + recurringComponent + spendComponent)));
}
const SCORE_BANDS = [
  [10, "You're just getting started. Small changes today can lead to big improvements over time."],
  [20, "There's plenty of room to grow. Focus on reducing unnecessary spending and building consistent saving habits."],
  [30, "You're moving in the right direction, but your finances could benefit from a few meaningful adjustments."],
  [40, "A decent foundation, but improving your spending habits now will make saving much easier."],
  [50, "You're around the halfway mark. A few smart changes could noticeably improve your financial health."],
  [60, "You're doing well. Keep reducing unnecessary expenses and your progress will continue to build."],
  [70, "A strong financial position. Stay consistent and look for small opportunities to save even more."],
  [80, "Great work! Your finances are in good shape, and you're building a solid path toward financial freedom."],
  [90, "Excellent! Your spending habits support long-term success. Keep up the consistency."],
  [100, "Outstanding! You're making exceptional financial decisions and maximizing your potential to build lasting wealth."],
];
function scoreDescription(score) {
  const band = SCORE_BANDS.find(([max]) => score <= max);
  return band ? band[1] : SCORE_BANDS[SCORE_BANDS.length - 1][1];
}

          <div onClick={() => !unlocked && scrollToPricing()} className="glass tint-purple" style={{ flex: 1, height: 188, textAlign: "left", borderRadius: 20, padding: 16, position: "relative", display: "flex", flexDirection: "column", cursor: unlocked ? "default" : "pointer", overflow: "hidden" }}>
            <div className="glass-swirl"></div>
                        <div style={{ width: "100%", fontSize: 10, fontWeight: 800, color: "#E5E4FF", letterSpacing: 0.1, textTransform: "uppercase", whiteSpace: "nowrap", textAlign: "left" }}>Financial Health Score</div>
            <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 4 }}>
              <ScoreGauge score={score} color={scoreColor} locked={!unlocked} showLockedLabel size={92} thickness={10} />
            </div>
            {!unlocked && (
              <button onClick={scrollToPricing} className="glass" style={{ alignSelf: "center", display: "inline-flex", alignItems: "center", gap: 5, borderRadius: 13, padding: "8px 12px", whiteSpace: "nowrap", position: "relative", overflow: "hidden" }}>
                <div className="glass-swirl"></div>
                <Icon.Lock size={11} color="#C3B8FF" />
                <span style={{ fontSize: 10.5, fontWeight: 800, color: "#C3B8FF", letterSpacing: 0.3, textTransform: "uppercase" }}>Unlock Score</span>
              </button>
            )}
          </div>
        )}
      </div>

      {hasIncome && (
        <div style={{ margin: "0 20px 20px" }}>
          <button onClick={() => setInsightOpen(!insightOpen)} className="glass" style={{ width: "100%", textAlign: "left", display: "flex", alignItems: "center", justifyContent: "space-between", borderRadius: 18, padding: "14px 16px", position: "relative", overflow: "hidden" }}>
            <div className="glass-swirl"></div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <Icon.Sparkles size={13} color="#FF2D92" />
              <span style={{ fontSize: 12, fontWeight: 800, color: "#FFD6EE", letterSpacing: 0.5, textTransform: "uppercase" }}>AI Insight</span>
            </div>
            <Icon.ChevronDown size={17} color={C.textSecondary} style={{ transform: insightOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }} />
          </button>

          {insightOpen && (
            <div style={{ marginTop: 10 }}>
              {hasBalanceCheck && (
                <div className="glass" style={{ borderRadius: 20, padding: "16px 18px", marginBottom: 8, position: "relative", overflow: "hidden" }}>
                  <div className="glass-swirl"></div>
                                    <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase" }}>Balance Change (this period)</div>
                  <div style={{ fontSize: 12.5, color: C.textSecondary, marginTop: 2, opacity: 0.85 }}>(exact — calculated directly from your statement)</div>
                  {unlocked ? (
                    <div style={{ fontSize: 27, fontWeight: 800, marginTop: 8, color: balanceChange >= 0 ? C.green : C.red }}>
                      {balanceChange >= 0 ? "+" : "-"}{cur}{Math.abs(balanceChange).toLocaleString(undefined, { maximumFractionDigits: 2 })}
                    </div>
                  ) : (
                    <React.Fragment>
                      <div style={{ fontSize: 27, fontWeight: 800, marginTop: 8, color: C.textSecondary }}>{cur}••••</div>
                      <button onClick={scrollToPricing} style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 10, background: "none", border: "none", padding: 0 }}>
                        <Icon.Lock size={12} color={C.blue} />
                        <span style={{ fontSize: 12, fontWeight: 700, color: C.blue }}>Tap to unlock</span>
                      </button>
                    </React.Fragment>
                  )}
                </div>
              )}

              {hasSuspicious && (
                <div className="glass" style={{ borderRadius: 20, padding: "16px 18px", marginBottom: 8, position: "relative", overflow: "hidden" }}>
                  <div className="glass-swirl"></div>
                                    <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase" }}>Suspicious Charges</div>
                  <div style={{ fontSize: 12.5, color: C.textSecondary, marginTop: 2, opacity: 0.85 }}>(unusual or unrecognized transactions worth double-checking)</div>
                  <div style={{ fontSize: 25, fontWeight: 800, marginTop: 7, color: C.orange }}>{result.suspiciousCharges.length} flagged</div>
                  {unlocked ? (
                    <div style={{ marginTop: 10, borderRadius: 12, overflow: "hidden", background: "rgba(255,159,10,0.08)" }}>
                      {result.suspiciousCharges.map((s, i) => (
                        <div key={i} style={{ padding: "10px 12px", borderBottom: i < result.suspiciousCharges.length - 1 ? `1px solid ${C.separator}` : "none" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                            <span style={{ fontSize: 13, fontWeight: 600, color: C.textPrimary, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.description}</span>
                            <span style={{ fontSize: 13, fontWeight: 700, color: C.orange, flexShrink: 0 }}>{cur}{s.amount}</span>
                          </div>
                          <div style={{ fontSize: 11, color: C.textSecondary, marginTop: 2 }}>{s.date} — {s.reason}</div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <button onClick={scrollToPricing} style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 9, background: "none", border: "none", padding: 0 }}>
                      <Icon.Lock size={11} color={C.blue} />
                      <span style={{ fontSize: 11.5, fontWeight: 700, color: C.blue }}>Unlock insight</span>
                    </button>
                  )}
                </div>
              )}

              <StatCard
                label="Saving Rate"
                subtitle="(how much of your income you're saving)"
                value={`${Math.round(savingsRate)}%`}
                unlocked={unlocked}
                color={savingsColor(savingsRate)}
                description={savingsDescription(savingsRate)}
                onUnlock={scrollToPricing}
              />

              <StatCard
                label="Recurring Costs"
                subtitle="(how much of your income is recurring costs)"
                value={`${Math.round(recurringPct)}%  ·  ${cur}${fmt(result.totalMonthly)}/mo`}
                unlocked={unlocked}
                color={bandColor(recurringPct, 10, 20)}
                description={recurringDescription(recurringPct)}
                onUnlock={scrollToPricing}
              />

              <StatCard
                label="Costs"
                subtitle="(how much of your income you're spending)"
                value={`${Math.round(spendPct)}%  ·  ${cur}${fmt(result.monthlySpending)}/mo`}
                unlocked={unlocked}
                color={bandColor(spendPct, 60, 80)}
                description={spendDescription(spendPct)}
                onUnlock={scrollToPricing}
              />

              {discretionaryPct != null && (
                <StatCard
                  label="Discretionary Spending"
                  subtitle="(how much you're spending on wants rather than needs)"
                  value={`${Math.round(discretionaryPct)}%`}
                  unlocked={unlocked}
                  color={bandColor(discretionaryPct, 15, 30)}
                  description={discretionaryDescription(discretionaryPct)}
                  onUnlock={scrollToPricing}
                />
              )}

              {essentialPct != null && (
                <StatCard
                  label="Essential Spending"
                  subtitle="(groceries, utilities, transport, insurance)"
                  value={`${Math.round(essentialPct)}%`}
                  unlocked={unlocked}
                  color={bandColor(essentialPct, 50, 65)}
                  description={essentialDescription(essentialPct)}
                  onUnlock={scrollToPricing}
                />
              )}

              {result.largestCategoryName && (
                <StatCard
                  label="Largest Spending Category"
                  value={`${result.largestCategoryName} · ${cur}${fmt(result.largestCategoryTotal)}`}
                  unlocked={unlocked}
                  color={C.textPrimary}
                  description="This is where your money goes most. Focusing on your largest expense is often the fastest way to unlock bigger savings and reach your financial goals sooner. However, if it's an essential expense, don't worry — it's simply something to be aware of, not something to stress over."
                  onUnlock={scrollToPricing}
                />
              )}

              {unlocked && (
                <div className="glass" style={{ marginTop: 4, padding: "14px 16px", borderRadius: 18, position: "relative", overflow: "hidden" }}>
                  <div className="glass-swirl"></div>
                                    <div style={{ fontSize: 12.5, color: C.textPrimary, lineHeight: 1.5 }}>
                    Small, consistent choices compound over time — the fact that you're looking closely at this already puts you ahead. Pick one thing from this report to change this month, and let it become a habit before adding the next.
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {!unlocked && (
        <div ref={pricingRef} style={{ padding: "16px 20px 0" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textSecondary, marginBottom: 10, marginLeft: 4, textTransform: "uppercase", letterSpacing: 0.4 }}>Unlock Everything</div>

          <button onClick={() => setUnlocked(true)} className="glass"
            style={{ width: "100%", borderRadius: 20, padding: "18px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, position: "relative", overflow: "hidden" }}>
            <div className="glass-swirl"></div>
                        <div style={{ textAlign: "left" }}>
              <div style={{ color: C.textPrimary, fontSize: 15, fontWeight: 700 }}>Unlock this report</div>
              <div style={{ color: C.textSecondary, fontSize: 12 }}>One-time · all leaks, scripts & metrics</div>
            </div>
            <div style={{ color: C.textPrimary, fontSize: 18, fontWeight: 800 }}>$9</div>
          </button>

          <div style={{ position: "relative", marginBottom: 10 }}>
            <button onClick={() => setUnlocked(true)} className="glass"
              style={{ width: "100%", borderRadius: 20, padding: "18px 18px", position: "relative", overflow: "hidden" }}>
              <div className="glass-swirl"></div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ textAlign: "left" }}>
                  <div style={{ color: "#fff", fontSize: 15, fontWeight: 700 }}>Monthly membership</div>
                  <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 12 }}>2 report unlocks every month</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ color: "#fff", fontSize: 18, fontWeight: 800 }}>$6.99</div>
                  <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 11 }}>/month</div>
                </div>
              </div>
            </button>
            <div style={{ position: "absolute", top: -9, left: 18, background: "#FFD60A", color: "#1C1C1E", fontSize: 10, fontWeight: 800, padding: "3px 10px", borderRadius: 8, letterSpacing: 0.3 }}>BEST VALUE</div>
          </div>

          <button onClick={() => setUnlocked(true)} className="glass"
            style={{ width: "100%", borderRadius: 20, padding: "18px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative", overflow: "hidden" }}>
            <div className="glass-swirl"></div>
                        <div style={{ textAlign: "left" }}>
              <div style={{ color: C.textPrimary, fontSize: 15, fontWeight: 700 }}>Share Pack — 2 unlocks</div>
              <div style={{ color: C.textSecondary, fontSize: 12 }}>One for you, one for a friend · save $3</div>
            </div>
            <div style={{ color: C.textPrimary, fontSize: 18, fontWeight: 800 }}>$15</div>
          </button>

          <div style={{ textAlign: "center", fontSize: 11, color: C.textSecondary, marginTop: 10 }}>Demo only, no real charge yet</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LeakFinder />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
  }
  if ("caches" in window) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
  }
</script>
</body>
</html>
