function LeakFinder() {
  const [screen, setScreen] = useState("input");
  const [rawText, setRawText] = useState("");
  const [result, setResult] = useState(null);
  const [unlocked, setUnlocked] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");

  async function analyze() {
    if (!rawText.trim()) return;
    setScreen("loading");
    setErrorMsg("");
    try {
      const response = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: rawText }),
      });

      const parsed = await response.json();
      if (!response.ok || parsed.error) throw new Error(parsed.error || "Request failed");
      if (!parsed.items || !Array.isArray(parsed.items)) throw new Error("Malformed response");

      setResult(parsed);
      setUnlocked(false);
      setExpanded(null);
      setScreen("results");
    } catch (err) {
      console.error("Analysis error:", err);
      setErrorMsg("Couldn't analyze that data. Try pasting a longer statement export, or try the sample data.");
      setScreen("error");
    }
  }

  function copyScript(idx, script) {
    navigator.clipboard.writeText(script).catch(() => {});
    setCopiedIdx(idx);
    setTimeout(() => setCopiedIdx(null), 1600);
  }

  const confColor = (conf) => (conf === "high" ? C.red : conf === "medium" ? C.orange : C.textSecondary);

  return (
    <div className="app-shell" style={{ background: C.bg, fontFamily: FONT }}>
      <div style={{ height: "env(safe-area-inset-top, 0px)", background: C.bg }} />
      <div style={{ minHeight: "100vh", paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {screen === "input" && <InputScreen rawText={rawText} setRawText={setRawText} onAnalyze={analyze} />}
        {screen === "loading" && <LoadingScreen />}
        {screen === "error" && <ErrorScreen message={errorMsg} onBack={() => setScreen("input")} />}
        {screen === "results" && result && (
          <ResultsScreen result={result} unlocked={unlocked} setUnlocked={setUnlocked}
            expanded={expanded} setExpanded={setExpanded} copiedIdx={copiedIdx}
            copyScript={copyScript} confColor={confColor} onBack={() => setScreen("input")} />
        )}
      </div>
    </div>
  );
}

function NavTitle({ children, onBack }) {
  return (
    <div style={{ padding: "20px 20px 4px" }}>
      {onBack && (
        <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 2, background: "none", border: "none", color: C.blue, fontSize: 17, padding: "6px 0", marginBottom: 2 }}>
          <Icon.ArrowLeft size={18} /> Back
        </button>
      )}
      <div style={{ fontSize: 34, fontWeight: 800, color: C.textPrimary, letterSpacing: -0.5 }}>{children}</div>
    </div>
  );
}

function InputScreen({ rawText, setRawText, onAnalyze }) {
  return (
    <div>
      <NavTitle>Leak Finder</NavTitle>
      <p style={{ padding: "0 20px", color: C.textSecondary, fontSize: 15, marginTop: 4, lineHeight: 1.4 }}>
        Paste 3–6 months of transactions from your bank or card export. We'll find what's quietly recurring.
      </p>
      <div style={{ padding: "16px 20px" }}>
        <textarea value={rawText} onChange={(e) => setRawText(e.target.value)}
          placeholder="Paste your transaction history here..."
          style={{ width: "100%", height: 220, borderRadius: 16, border: `1px solid ${C.separator}`, background: C.card, padding: 14, fontSize: 14, color: C.textPrimary, fontFamily: "ui-monospace, SFMono-Regular, monospace", resize: "none", outline: "none" }} />
      </div>
      <div style={{ padding: "0 20px" }}>
        <button onClick={() => setRawText(SAMPLE_DATA)}
          style={{ width: "100%", background: C.card, border: `1px solid ${C.separator}`, borderRadius: 14, padding: "13px 0", fontSize: 16, fontWeight: 600, color: C.blue, marginBottom: 10 }}>
          Try sample data
        </button>
        <button onClick={onAnalyze} disabled={!rawText.trim()}
          style={{ width: "100%", background: rawText.trim() ? C.blue : "#B9DBFF", border: "none", borderRadius: 14, padding: "15px 0", fontSize: 17, fontWeight: 700, color: "#fff" }}>
          Find My Leaks
        </button>
      </div>
      <div style={{ padding: "20px 20px 0", display: "flex", gap: 8, alignItems: "flex-start" }}>
        <Icon.Lock size={14} color={C.textSecondary} />
        <span style={{ fontSize: 12, color: C.textSecondary, lineHeight: 1.4 }}>Nothing is stored. Your data is analyzed once and discarded.</span>
      </div>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div style={{ height: "80vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
      <div style={{ animation: "spin 1s linear infinite" }}>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke={C.blue} strokeWidth="2.5" strokeLinecap="round">

        </svg>

      <div style={{ fontSize: 16, fontWeight: 600, color: C.textPrimary }}>Scanning for leaks…</div>

}

function ErrorScreen({ message, onBack }) {
  return (
    <div style={{ padding: "60px 24px", textAlign: "center" }}>
      <div style={{ marginBottom: 12 }}><Icon.AlertCircle size={36} color={C.red} /></div>
      <div style={{ fontSize: 17, fontWeight: 600, color: C.textPrimary, marginBottom: 6 }}>Something went wrong</div>
      <div style={{ fontSize: 14, color: C.textSecondary, marginBottom: 20, lineHeight: 1.5 }}>{message}</div>
      <button onClick={onBack} style={{ background: C.blue, color: "#fff", border: "none", borderRadius: 14, padding: "13px 28px", fontSize: 16, fontWeight: 700 }}>Try again</button>
    </div>
  );
}

function Ring({ pct, size = 132 }) {
  const stroke = 12, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const offset = c - (Math.min(pct, 100) / 100) * c;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size / 2} cy={size / 2} r={r} stroke="#FFFFFF55" strokeWidth={stroke} fill="none" />
      <circle cx={size / 2} cy={size / 2} r={r} stroke="#fff" strokeWidth={stroke} fill="none"
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" />
    </svg>
  );
}

// ---- deterministic scoring helpers (all math done here, never trusted to the model) ----
function bandColor(value, greenMax, yellowMax) {
  if (value <= greenMax) return C.green;
  if (value <= yellowMax) return C.orange;
  return C.red;
}
function savingsColor(v) {
  if (v >= 30) return C.green;
  if (v >= 20) return C.orange;
  return C.red;
}
function computeScore({ savingsRate, recurringPct, spendPct }) {
  const savingsComponent = Math.max(0, Math.min(40, (savingsRate / 30) * 40));
  const recurringComponent = Math.max(0, Math.min(30, 30 - (recurringPct / 20) * 30));
  const spendComponent = Math.max(0, Math.min(30, 30 - ((spendPct - 50) / 40) * 30));
  return Math.round(Math.max(0, Math.min(100, savingsComponent + recurringComponent + spendComponent)));
}
const SCORE_BANDS = [
  [10, "You're just getting started. Small changes today can lead to big improvements over time."],
  [20, "There's plenty of room to grow. Focus on reducing unnecessary spending and building consistent saving habits."],
  [30, "You're moving in the right direction, but your finances could benefit from a few meaningful adjustments."],
  [40, "A decent foundation, but improving your spending habits now will make saving much easier."],
  [50, "You're around the halfway mark. A few smart changes could noticeably improve your financial health."],
  [60, "You're doing well. Keep reducing unnecessary expenses and your progress will continue to build."],
  [70, "A strong financial position. Stay consistent and look for small opportunities to save even more."],
  [80, "Great work! Your finances are in good shape, and you're building a solid path toward financial freedom."],
  [90, "Excellent! Your spending habits support long-term success. Keep up the consistency."],
  [100, "Outstanding! You're making exceptional financial decisions and maximizing your potential to build lasting wealth."],
];
function scoreDescription(score) {
  const band = SCORE_BANDS.find(([max]) => score <= max);
  return band ? band[1] : SCORE_BANDS[SCORE_BANDS.length - 1][1];
}

function StatCard({ label, subtitle, value, unlocked, color, description, onClick }) {
  return (
    <button onClick={onClick} style={{ width: "100%", textAlign: "left", background: C.card, border: "none", borderRadius: 18, padding: "16px 18px", marginBottom: 10, cursor: unlocked ? "default" : "pointer", display: "block" }}>
      <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.3, textTransform: "uppercase" }}>{label}</div>
      {subtitle && <div style={{ fontSize: 12.5, color: C.textSecondary, marginTop: 2 }}>{subtitle}</div>}
      <div style={{ fontSize: 28, fontWeight: 800, marginTop: 8, color: unlocked ? color : C.textPrimary, filter: unlocked ? "none" : "blur(8px)" }}>
        {value}
      </div>
      {description && (
        <div style={{ fontSize: 12.5, color: C.textSecondary, marginTop: 8, lineHeight: 1.5, filter: unlocked ? "none" : "blur(3px)" }}>
          {description}
        </div>
      )}
      {!unlocked && (
        <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 10 }}>
          <Icon.Lock size={12} color={C.blue} />
          <span style={{ fontSize: 12, fontWeight: 700, color: C.blue }}>Tap to unlock</span>
        </div>
      )}
    </button>
  );
}

function ResultsScreen({ result, unlocked, setUnlocked, expanded, setExpanded, copiedIdx, copyScript, confColor, onBack }) {
  const cur = result.currencySymbol || "$";
  const visibleItems = unlocked ? result.items : result.items.slice(0, 1);
  const lockedCount = result.items.length - visibleItems.length;
  const hasIncome = result.monthlyIncome > 0;

  const recurringPct = hasIncome ? (result.totalMonthly / result.monthlyIncome) * 100 : 0;
  const spendPct = hasIncome ? (result.monthlySpending / result.monthlyIncome) * 100 : 0;
  const savingsRate = hasIncome ? ((result.monthlyIncome - result.monthlySpending) / result.monthlyIncome) * 100 : 0;
  const discretionaryPct = hasIncome && result.monthlyDiscretionary != null ? (result.monthlyDiscretionary / result.monthlyIncome) * 100 : null;
  const essentialPct = hasIncome && result.monthlyEssential != null ? (result.monthlyEssential / result.monthlyIncome) * 100 : null;
  const score = hasIncome ? computeScore({ savingsRate, recurringPct, spendPct }) : null;
  const hasBalanceCheck = result.startingBalance != null && result.endingBalance != null;
  const balanceChange = hasBalanceCheck ? result.endingBalance - result.startingBalance : null;
  const isVariableIncome = result.incomeSteadiness === "variable";

  const fmt = (n) => Math.round(n).toLocaleString();

  return (
    <div style={{ paddingBottom: 24 }}>
      <NavTitle onBack={onBack}>Your Report</NavTitle>

      <div style={{ margin: "12px 20px 12px" }}>
        <div style={{ background: `linear-gradient(135deg, ${C.blue}, #4DA3FF)`, borderRadius: 24, padding: 24, display: "flex", alignItems: "center", gap: 18, boxShadow: "0 8px 24px rgba(0,122,255,0.35)" }}>
          <div style={{ position: "relative", flexShrink: 0 }}>
            <Ring pct={72} />
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon.Sparkles size={20} color="#fff" />
            </div>
          </div>
          <div>
            <div style={{ color: "#EAF3FF", fontSize: 13, fontWeight: 600 }}>FOUND PER YEAR</div>
            <div style={{ color: "#fff", fontSize: 32, fontWeight: 800, letterSpacing: -0.5 }}>{cur}{result.totalAnnual?.toLocaleString()}</div>
            <div style={{ color: "#EAF3FF", fontSize: 13, marginTop: 2 }}>{result.itemCount} recurring charges · {cur}{fmt(result.totalMonthly)}/mo</div>
          </div>
        </div>
      </div>

      {hasIncome ? (
        <div style={{ margin: "0 20px 20px" }}>
          <div style={{ background: C.card, borderRadius: 18, padding: "16px 18px", marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.3, textTransform: "uppercase" }}>Monthly Income</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: C.textPrimary, marginTop: 8 }}>{cur}{result.monthlyIncome?.toLocaleString()}</div>
          </div>

          <div style={{ fontSize: 13, fontWeight: 700, color: C.textSecondary, margin: "18px 4px 8px", textTransform: "uppercase", letterSpacing: 0.3 }}>Financial Health</div>

          {isVariableIncome && (
            <div style={{ margin: "0 0 10px", padding: "12px 14px", background: "#FFF4E5", borderRadius: 14, fontSize: 12.5, color: C.textPrimary, lineHeight: 1.5 }}>
              Your income looks variable (freelance or client payments rather than a fixed salary), so the percentages below are estimates and may not capture your full financial picture. The balance change below is exact, since it's calculated directly from your statement.
            </div>
          )}

          {hasBalanceCheck && (
            <div style={{ background: C.card, borderRadius: 18, padding: "16px 18px", marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 700, letterSpacing: 0.3, textTransform: "uppercase" }}>Balance Change (this period)</div>
              <div style={{ fontSize: 12.5, color: C.textSecondary, marginTop: 2 }}>(exact — calculated directly from your statement, not estimated)</div>
              <div style={{ fontSize: 28, fontWeight: 800, marginTop: 8, color: balanceChange >= 0 ? C.green : C.red, filter: unlocked ? "none" : "blur(8px)" }}>
                {balanceChange >= 0 ? "+" : "-"}{cur}{Math.abs(balanceChange).toLocaleString(undefined, { maximumFractionDigits: 2 })}
              </div>
              {!unlocked && (
                <button onClick={() => setUnlocked(true)} style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 10, background: "none", border: "none", padding: 0 }}>
                  <Icon.Lock size={12} color={C.blue} />
                  <span style={{ fontSize: 12, fontWeight: 700, color: C.blue }}>Tap to unlock</span>
                </button>
              )}
            </div>
          )}

          <StatCard
            label="Savings Rate"
            value={`${Math.round(savingsRate)}%`}
            unlocked={unlocked}
            color={savingsColor(savingsRate)}
            description="This is the money you're keeping for your future. Aim to save at least 20% of your income, with 30% or more being an excellent target. Every month you save brings you one step closer to financial freedom."
            onClick={() => !unlocked && setUnlocked(true)}
          />

          <StatCard
            label="Recurring Costs / Income"
            subtitle="(monthly commitments, subscriptions, leaks)"
            value={`${Math.round(recurringPct)}%  ·  ${cur}${fmt(result.totalMonthly)}/mo`}
            unlocked={unlocked}
            color={bandColor(recurringPct, 10, 20)}
            description="Try to keep recurring costs below 10–15% of your income. Under 10% is excellent, while above 20% can limit your financial flexibility. Keeping monthly commitments low makes it easier to save and adapt to life's changes."
            onClick={() => !unlocked && setUnlocked(true)}
          />

          <StatCard
            label="Costs / Income"
            subtitle="(how much of your income you're spending overall)"
            value={`${Math.round(spendPct)}%  ·  ${cur}${fmt(result.monthlySpending)}/mo`}
            unlocked={unlocked}
            color={bandColor(spendPct, 60, 80)}
            description="Aim to keep this below 70% of your income. Below 60% is excellent, while above 80% can make saving much harder. Every percentage point you reduce gives you more freedom to save, invest, and reach your goals."
            onClick={() => !unlocked && setUnlocked(true)}
          />

          {discretionaryPct != null && (
            <StatCard
              label="Discretionary Spending"
              subtitle="(how much you're spending on wants rather than needs)"
              value={`${Math.round(discretionaryPct)}%`}
              unlocked={unlocked}
              color={bandColor(discretionaryPct, 15, 30)}
              description="Wants are things you enjoy but could trim without much impact — a good first place to look for extra savings."
              onClick={() => !unlocked && setUnlocked(true)}
            />
          )}

          {essentialPct != null && (
            <StatCard
              label="Essential Spending"
              subtitle="(groceries, utilities, transport, insurance)"
              value={`${Math.round(essentialPct)}%`}
              unlocked={unlocked}
              color={bandColor(essentialPct, 50, 65)}
              description="These are costs you need to cover no matter what — the goal isn't to cut these, just to be aware of them."
              onClick={() => !unlocked && setUnlocked(true)}
            />
          )}

          {result.largestCategoryName && (
            <StatCard
              label="Largest Spending Category"
              value={`${result.largestCategoryName} · ${cur}${fmt(result.largestCategoryTotal)}`}
              unlocked={unlocked}
              color={C.textPrimary}
              description="This is where your money goes most. Focusing on your largest expense is often the fastest way to unlock bigger savings and reach your financial goals sooner."
              onClick={() => !unlocked && setUnlocked(true)}
            />
          )}

          {score != null && (
            <div style={{ background: `linear-gradient(135deg, ${C.textPrimary}, #3A3A3C)`, borderRadius: 18, padding: "18px 18px", marginTop: 4 }}>
              <div style={{ fontSize: 11, color: "#B8B8BD", fontWeight: 700, letterSpacing: 0.3, textTransform: "uppercase" }}>Financial Health Score</div>
              <div style={{ fontSize: 34, fontWeight: 800, color: "#fff", marginTop: 6, filter: unlocked ? "none" : "blur(9px)" }}>
                {score} <span style={{ fontSize: 16, fontWeight: 600, color: "#B8B8BD" }}>/ 100</span>
              </div>
              <div style={{ fontSize: 12.5, color: "#D5D5DA", marginTop: 10, lineHeight: 1.5, filter: unlocked ? "none" : "blur(3px)" }}>
                {scoreDescription(score)}
              </div>
              {!unlocked && (
                <button onClick={() => setUnlocked(true)} style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 12, background: "none", border: "none", padding: 0 }}>
                  <Icon.Lock size={12} color="#FFD60A" />
                  <span style={{ fontSize: 12, fontWeight: 700, color: "#FFD60A" }}>Tap to unlock</span>
                </button>
              )}
            </div>
          )}

          {unlocked && (
            <div style={{ marginTop: 12, padding: "14px 16px", background: "#EAF3FF", borderRadius: 14 }}>
              <div style={{ fontSize: 12.5, color: C.textPrimary, lineHeight: 1.5 }}>
                Small, consistent choices compound over time — the fact that you're looking closely at this already puts you ahead. Pick one thing from this report to change this month, and let it become a habit before adding the next.
              </div>
            </div>
          )}
        </div>
      ) : (
        <div style={{ margin: "0 20px 20px", padding: "16px 18px", background: C.card, borderRadius: 18 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textPrimary, marginBottom: 4 }}>Financial Health metrics unavailable</div>
          <div style={{ fontSize: 12.5, color: C.textSecondary, lineHeight: 1.5 }}>
            We couldn't identify a clear recurring income deposit (like a salary) in this statement, so savings rate and spending percentages can't be calculated. Try uploading a longer statement (3+ months) that includes your regular income deposits.
          </div>
        </div>
      )}

      <div style={{ margin: "0 20px 16px", padding: "12px 14px", background: "#EAF3FF", borderRadius: 14, display: "flex", gap: 10, alignItems: "flex-start" }}>
        <Icon.Sparkles size={15} color={C.blue} />
        <span style={{ fontSize: 12.5, color: C.textPrimary, lineHeight: 1.5 }}>
          Not everything below is a leak — some may be subscriptions you're happy to keep. Use this list to decide what's still worth it, and cancel anything you don't recognize or don't use anymore.
        </span>
      </div>

      <div style={{ padding: "0 20px" }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.textSecondary, marginBottom: 8, marginLeft: 4 }}>RECURRING CHARGES</div>
        <div style={{ background: C.card, borderRadius: 16, overflow: "hidden" }}>
          {visibleItems.map((item, i) => (
            <div key={i}>
              <button onClick={() => setExpanded(expanded === i ? null : i)}
                style={{ width: "100%", padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", background: "none", border: "none", borderBottom: i < visibleItems.length - 1 || expanded === i ? `1px solid ${C.separator}` : "none", textAlign: "left" }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 15, fontWeight: 600, color: C.textPrimary }}>{item.merchant}</span>
                    <span style={{ fontSize: 10, fontWeight: 700, color: "#fff", background: confColor(item.confidence), borderRadius: 6, padding: "2px 6px", textTransform: "uppercase" }}>{item.confidence}</span>
                  </div>
                  <div style={{ fontSize: 13, color: C.textSecondary, marginTop: 2 }}>{item.note}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0, marginLeft: 8 }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: C.textPrimary }}>
                      {cur}{item.lastAmount}<span style={{ fontSize: 11, color: C.textSecondary, fontWeight: 400 }}>/{item.frequency === "monthly" ? "mo" : item.frequency === "annual" ? "yr" : "wk"}</span>
                    </div>
                    <div style={{ fontSize: 10.5, color: C.textSecondary, marginTop: 1 }}>this month</div>
                    <div style={{ fontSize: 11, color: C.textSecondary, marginTop: 2 }}>avg/mo: {cur}{item.avgAmount}</div>
                  </div>
                  <Icon.ChevronDown size={16} color={C.textSecondary} style={{ transform: expanded === i ? "rotate(180deg)" : "none", transition: "transform 0.2s" }} />
                </div>
              </button>
              {expanded === i && (
                <div style={{ padding: "0 16px 16px", borderBottom: i < visibleItems.length - 1 ? `1px solid ${C.separator}` : "none" }}>
                  <div style={{ background: C.bg, borderRadius: 12, padding: 12, fontSize: 13, color: C.textPrimary, lineHeight: 1.5 }}>{item.cancellationScript}</div>
                  <button onClick={() => copyScript(i, item.cancellationScript)}
                    style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: C.blue, fontSize: 14, fontWeight: 600, padding: 0 }}>
                    {copiedIdx === i ? <Icon.Check size={15} /> : <Icon.Copy size={15} />}
                    {copiedIdx === i ? "Copied" : "Copy script"}
                  </button>
                </div>
              )}
            </div>
          ))}
          {!unlocked && lockedCount > 0 && (
            <div style={{ padding: 16 }}>
              {Array.from({ length: Math.min(lockedCount, 3) }).map((_, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", filter: "blur(4px)", opacity: 0.6, userSelect: "none" }}>
                  <div style={{ fontSize: 15, fontWeight: 600 }}>••••••• •••••</div>
                  <div style={{ fontSize: 15, fontWeight: 700 }}>{cur}••.••</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {!unlocked && lockedCount > 0 && (
        <div style={{ padding: "16px 20px 0" }}>
          <button onClick={() => setUnlocked(true)}
            style={{ width: "100%", background: C.textPrimary, border: "none", borderRadius: 16, padding: "16px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 6px 18px rgba(0,0,0,0.2)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 34, height: 34, borderRadius: 10, background: "#FFD60A", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Icon.Lock size={17} color="#1C1C1E" />
              </div>
              <div style={{ textAlign: "left" }}>
                <div style={{ color: "#fff", fontSize: 15, fontWeight: 700 }}>Unlock your full report</div>
                <div style={{ color: "#9A9AA0", fontSize: 12 }}>All leaks, scripts & financial health metrics</div>
              </div>
            </div>
            <div style={{ color: "#fff", fontSize: 16, fontWeight: 800 }}>$9</div>
          </button>
          <div style={{ textAlign: "center", fontSize: 11, color: C.textSecondary, marginTop: 8 }}>One-time unlock for this report · demo only, no real charge</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LeakFinder />);
</script>

<script>
  // Service worker caching is disabled for now while the app is actively changing —
  // it was causing old versions to reappear intermittently. This actively clears
  // out any previously registered worker/cache so everyone gets the live version.
  // Re-enable proper registration (see commented block below) once the product
  // is stable and ready for real offline support.
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
  }
  if ("caches" in window) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
  }
  // window.addEventListener("load", () => {
  //   navigator.serviceWorker.register("./sw.js").catch(() => {});
  // });
</script>
</body>
</html>
